{% extends "base.html" %}
{% block title %}Edit Task - Secure Task Manager{% endblock %}
{% block content %}

<div class="card">
    <h2>Edit Task</h2>
    <form method="post">
        <div class="form-group">
            <label for="title">Title</label>
            <input type="text" id="title" name="title" class="form-control" value="{{ task.title }}" required>
        </div>
        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description" class="form-control" placeholder="Add details about this task...">{{ task.description or '' }}</textarea>
        </div>
        <div class="form-group">
            <label for="status">Status</label>
            <select id="status" name="status" class="form-control">
                <option value="pending" {% if task.status == 'pending' %}selected{% endif %}>Pending</option>
                <option value="completed" {% if task.status == 'completed' %}selected{% endif %}>Completed</option>
            </select>
        </div>
        <div class="actions" style="display: flex; gap: 10px;">
            <button type="submit" class="btn btn-primary">Save Changes</button>
            <a href="{{ url_for('view_task', task_id=task.id) }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>

{% endblock %}
