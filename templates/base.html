<!DOCTYPE html>
<html>
<head>
    <title>Task Manager</title>
</head>
<body>
    <div>
        <a href="{{ url_for('tasks') }}">My Tasks</a>
        {% if session.user_id %}
            <a href="{{ url_for('logout') }}">Logout</a>
        {% else %}
            <a href="{{ url_for('login') }}">Login</a>
            <a href="{{ url_for('register') }}">Register</a>
        {% endif %}
    </div>
    <hr>
    {% block content %}{% endblock %}
</body>
</html>
